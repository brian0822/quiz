<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>桃園機場 A類駕駛許可證 題庫複習</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e3a5f;
    --accent: #0ea5e9;
    --accent2: #38bdf8;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #e2e8f0;
    --text-dim: #64748b;
    --text-mid: #94a3b8;
    --runway: #1e293b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background pattern */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(14, 165, 233, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(14, 165, 233, 0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: -200px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(14, 165, 233, 0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    text-align: center;
    padding: 40px 0 30px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(14, 165, 233, 0.1);
    border: 1px solid rgba(14, 165, 233, 0.3);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 12px;
    color: var(--accent2);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .badge::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  h1 {
    font-size: clamp(22px, 4vw, 36px);
    font-weight: 900;
    letter-spacing: -0.5px;
    line-height: 1.2;
    color: #fff;
  }

  h1 span {
    color: var(--accent);
  }

  .subtitle {
    color: var(--text-mid);
    margin-top: 8px;
    font-size: 14px;
  }

  /* Mode selector */
  .mode-bar {
    display: flex;
    gap: 8px;
    margin: 24px 0 20px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .mode-btn {
    padding: 8px 20px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-mid);
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
  }

  .mode-btn:hover { border-color: var(--accent); color: var(--text); }
  .mode-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 700;
  }

  /* Stats bar */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }

  .stat-val {
    font-size: 22px;
    font-weight: 900;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent2);
  }

  .stat-val.green { color: var(--green); }
  .stat-val.red { color: var(--red); }
  .stat-val.yellow { color: var(--yellow); }

  .stat-label {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  /* Progress bar */
  .progress-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .progress-label {
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
    font-family: 'JetBrains Mono', monospace;
  }

  .progress-bar {
    flex: 1;
    height: 6px;
    background: var(--runway);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 3px;
    transition: width 0.5s ease;
  }

  /* Question card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 16px;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .q-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    background: rgba(14, 165, 233, 0.1);
    border: 1px solid rgba(14, 165, 233, 0.2);
    padding: 3px 10px;
    border-radius: 6px;
  }

  .q-type {
    font-size: 11px;
    color: var(--text-dim);
    background: var(--surface2);
    padding: 3px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
  }

  .q-keyword {
    margin-left: auto;
    font-size: 11px;
    color: var(--yellow);
    background: rgba(245, 158, 11, 0.1);
    border: 1px solid rgba(245, 158, 11, 0.2);
    padding: 3px 10px;
    border-radius: 6px;
  }

  .q-text {
    font-size: 16px;
    font-weight: 500;
    line-height: 1.7;
    color: #fff;
    margin-bottom: 20px;
  }

  /* Options */
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    width: 100%;
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    line-height: 1.5;
  }

  .option:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(14, 165, 233, 0.08);
  }

  .option-letter {
    min-width: 28px;
    height: 28px;
    border-radius: 6px;
    background: var(--runway);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-dim);
    flex-shrink: 0;
  }

  .option.correct {
    border-color: var(--green);
    background: rgba(34, 197, 94, 0.1);
  }
  .option.correct .option-letter {
    background: var(--green);
    color: #fff;
    border-color: var(--green);
  }

  .option.wrong {
    border-color: var(--red);
    background: rgba(239, 68, 68, 0.1);
  }
  .option.wrong .option-letter {
    background: var(--red);
    color: #fff;
    border-color: var(--red);
  }

  .option:disabled { cursor: default; }

  /* Feedback */
  .feedback {
    margin-top: 16px;
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.6;
    display: none;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .feedback.show { display: block; }

  .feedback.correct-fb {
    background: rgba(34, 197, 94, 0.1);
    border: 1px solid rgba(34, 197, 94, 0.3);
    color: #86efac;
  }

  .feedback.wrong-fb {
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid rgba(239, 68, 68, 0.3);
    color: #fca5a5;
  }

  .feedback-icon {
    font-size: 18px;
    margin-right: 8px;
  }

  /* Source tag */
  .source-tag {
    margin-top: 10px;
    font-size: 11px;
    color: var(--text-dim);
    font-style: italic;
  }

  /* Actions */
  .actions {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  .btn {
    padding: 12px 24px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    font-weight: 700;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    flex: 1;
  }
  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text-mid);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--text); }

  .btn-danger {
    background: rgba(239, 68, 68, 0.15);
    color: #fca5a5;
    border: 1px solid rgba(239, 68, 68, 0.3);
  }

  /* Result screen */
  .result-screen {
    display: none;
    text-align: center;
    padding: 40px 20px;
  }

  .result-screen.show { display: block; }

  .result-score {
    font-size: 80px;
    font-weight: 900;
    font-family: 'JetBrains Mono', monospace;
    line-height: 1;
    margin: 20px 0;
  }

  .result-grade {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 10px;
  }

  .result-msg {
    color: var(--text-mid);
    font-size: 14px;
    margin-bottom: 30px;
  }

  /* Filter tabs */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 12px;
    font-family: 'Noto Sans TC', sans-serif;
    transition: all 0.2s;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: rgba(14, 165, 233, 0.15); border-color: var(--accent); color: var(--accent2); }

  /* Runway decoration */
  .runway-deco {
    height: 3px;
    background: repeating-linear-gradient(90deg, var(--yellow) 0, var(--yellow) 20px, transparent 20px, transparent 40px);
    margin: 20px 0;
    border-radius: 2px;
    opacity: 0.4;
  }

  /* T/F special layout */
  .tf-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .tf-opt {
    padding: 20px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    text-align: center;
    font-size: 28px;
    font-weight: 900;
    transition: all 0.2s;
    color: var(--text-mid);
    font-family: 'JetBrains Mono', monospace;
  }

  .tf-opt:hover:not(:disabled) { transform: scale(1.02); }
  .tf-opt.tf-true:hover:not(:disabled) { border-color: var(--green); color: var(--green); background: rgba(34,197,94,0.08); }
  .tf-opt.tf-false:hover:not(:disabled) { border-color: var(--red); color: var(--red); background: rgba(239,68,68,0.08); }
  .tf-opt.correct { border-color: var(--green); color: var(--green); background: rgba(34,197,94,0.1); }
  .tf-opt.wrong { border-color: var(--red); color: var(--red); background: rgba(239,68,68,0.1); }
  .tf-opt:disabled { cursor: default; }

  .tf-sub { font-size: 12px; font-weight: 400; font-family: 'Noto Sans TC', sans-serif; margin-top: 4px; }

  @media (max-width: 600px) {
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .card { padding: 18px; }
    .q-keyword { display: none; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="badge">TAOYUAN INTL AIRPORT · TPE/RCTP</div>
    <h1>A類<span>駕駛許可證</span><br>題庫複習系統</h1>
    <p class="subtitle">桃園國際機場空側駕駛許可證測驗 · 115年3月2日公布版</p>
  </header>

  <div class="mode-bar">
    <button class="mode-btn active" onclick="setMode('all')">📋 全部題目</button>
    <button class="mode-btn" onclick="setMode('single')">🔘 單選題</button>
    <button class="mode-btn" onclick="setMode('truefalse')">✅ 是非題</button>
    <button class="mode-btn" onclick="setMode('random')">🔀 隨機練習</button>
    <button class="mode-btn" onclick="setMode('wrong')">❌ 錯題複習</button>
  </div>

  <div class="stats-bar">
    <div class="stat">
      <div class="stat-val" id="stat-total">0</div>
      <div class="stat-label">總題數</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="stat-done">0</div>
      <div class="stat-label">已作答</div>
    </div>
    <div class="stat">
      <div class="stat-val green" id="stat-correct">0</div>
      <div class="stat-label">答對</div>
    </div>
    <div class="stat">
      <div class="stat-val red" id="stat-wrong">0</div>
      <div class="stat-label">答錯</div>
    </div>
  </div>

  <div class="progress-wrap">
    <span class="progress-label" id="prog-label">0 / 0</span>
    <div class="progress-bar">
      <div class="progress-fill" id="prog-fill" style="width:0%"></div>
    </div>
    <span class="progress-label" id="prog-pct">0%</span>
  </div>

  <div class="runway-deco"></div>

  <div id="quiz-area"></div>

  <div class="result-screen" id="result-screen">
    <div class="badge">測驗完成</div>
    <div class="result-score" id="result-score"></div>
    <div class="result-grade" id="result-grade"></div>
    <div class="result-msg" id="result-msg"></div>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="restartQuiz()">🔄 重新練習</button>
      <button class="btn btn-secondary" onclick="setMode('wrong')">❌ 複習錯題</button>
    </div>
  </div>
</div>

  {id:5,type:'single',q:'進入操作區車輛應獲何單位許可始可穿越、通行及滯留操作區？',opts:['塔臺','航務處','營運安全處','工程處'],ans:0,kw:'操作區'},

  {id:14,type:'single',q:'何者禁止穿越Q滑行道？',opts:['行人','航務處黃車','維護處作業車輛','消防車'],ans:0,kw:'滑行道'},
  {id:15,type:'single',q:'作業人員執行拖機作業時，拖機速度於停機坪上不得超過每小時幾公里？',opts:['5','10','15','20'],ans:0,kw:'速限'},
  {id:16,type:'single',q:'作業人員執行拖機作業時，拖桿式拖機速度於滑行道上不得超過每小時幾公里？',opts:['15','20','25','30'],ans:0,kw:'速限'},
  {id:17,type:'single',q:'作業人員執行拖機作業時，無拖桿式拖車於滑行道上不得超過每小時幾公里？',opts:['20','25','30','35'],ans:0,kw:'速限'},
  {id:18,type:'single',q:'執行拖機作業應與何單位保持無線電通聯，並按其指示路線行進？',opts:['塔臺','航務處','營運安全處','工程處'],ans:0,kw:'無線電通訊'},

// ========== STATE ==========
let mode = 'all';
let pool = [];
let current = 0;
let answered = false;
let correctCount = 0;
let wrongCount = 0;
let wrongIds = new Set();
let sessionAnswered = new Set();

const LABELS = ['A','B','C','D'];

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach((b,i) => {
    const modes = ['all','single','truefalse','random','wrong'];
    b.classList.toggle('active', modes[i] === m);
  });
  restartQuiz();
}

function buildPool() {
  let base = [...QUESTIONS];
  if (mode === 'single') base = base.filter(q=>q.type==='single');
  else if (mode === 'truefalse') base = base.filter(q=>q.type==='tf');
  else if (mode === 'wrong') {
    base = base.filter(q=>wrongIds.has(q.id));
    if (base.length === 0) { alert('目前沒有錯題！請先作答後再複習。'); return false; }
  }
  if (mode === 'random') {
    base = base.sort(()=>Math.random()-0.5);
  }
  return base;
}

function restartQuiz() {
  const p = buildPool();
  if (!p) return;
  pool = p;
  current = 0;
  answered = false;
  correctCount = 0;
  wrongCount = 0;
  sessionAnswered = new Set();
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('quiz-area').style.display = 'block';
  updateStats();
  renderQuestion();
}

// Store shuffled order for current question
let shuffledOpts = [];

function renderQuestion() {
  if (current >= pool.length) {
    showResult();
    return;
  }
  const q = pool[current];
  answered = false;
  updateStats();

  const area = document.getElementById('quiz-area');
  const typeLabel = q.type === 'single' ? '單選題' : '是非題';

  let optHTML = '';
  if (q.type === 'single') {
    // Shuffle options, track where correct answer ends up
    const indices = q.opts.map((_,i) => i).sort(() => Math.random() - 0.5);
    shuffledOpts = indices; // indices[displayPos] = originalIndex
    const shuffledCorrectPos = indices.indexOf(q.ans);

    optHTML = `<div class="options">` +
      indices.map((origIdx, displayPos) => `
        <button class="option" onclick="answer(${displayPos})" id="opt-${displayPos}">
          <span class="option-letter">${LABELS[displayPos]}</span>
          <span>${q.opts[origIdx]}</span>
        </button>`).join('') +
      `</div>`;
  } else {
    optHTML = `<div class="tf-options">
      <button class="tf-opt tf-true" onclick="answerTF(true)" id="tf-true">
        ○<div class="tf-sub">正確</div>
      </button>
      <button class="tf-opt tf-false" onclick="answerTF(false)" id="tf-false">
        ✕<div class="tf-sub">錯誤</div>
      </button>
    </div>`;
  }

  area.innerHTML = `
    <div class="card">
      <div class="q-meta">
        <span class="q-num">Q${current+1}</span>
        <span class="q-type">${typeLabel}</span>
        <span class="q-keyword"># ${q.kw}</span>
      </div>
      <div class="q-text">${q.q}</div>
      ${optHTML}
      <div class="feedback" id="feedback"></div>
    </div>
    <div class="actions">
      ${answered ? `<button class="btn btn-primary" onclick="nextQuestion()">下一題 →</button>` : ''}
      <button class="btn btn-secondary" onclick="skipQuestion()">跳過</button>
    </div>
  `;
}

function answer(displayPos) {
  if (answered) return;
  answered = true;
  const q = pool[current];
  const originalIdx = shuffledOpts[displayPos];
  const correct = originalIdx === q.ans;
  const correctDisplayPos = shuffledOpts.indexOf(q.ans);
  sessionAnswered.add(q.id);
  if (correct) {
    correctCount++;
    wrongIds.delete(q.id);
  } else {
    wrongCount++;
    wrongIds.add(q.id);
  }

  // Style options
  shuffledOpts.forEach((_, i) => {
    const btn = document.getElementById(`opt-${i}`);
    btn.disabled = true;
    if (i === correctDisplayPos) btn.classList.add('correct');
    else if (i === displayPos) btn.classList.add('wrong');
  });

  showFeedback(correct, correct ? '' : `正確答案：${LABELS[correctDisplayPos]}. ${q.opts[q.ans]}`);
  updateActions();
}

function answerTF(val) {
  if (answered) return;
  answered = true;
  const q = pool[current];
  const correct = val === q.ans;
  sessionAnswered.add(q.id);
  if (correct) {
    correctCount++;
    wrongIds.delete(q.id);
  } else {
    wrongCount++;
    wrongIds.add(q.id);
  }

  document.getElementById('tf-true').disabled = true;
  document.getElementById('tf-false').disabled = true;

  if (q.ans === true) {
    document.getElementById('tf-true').classList.add('correct');
    if (!correct) document.getElementById('tf-false').classList.add('wrong');
  } else {
    document.getElementById('tf-false').classList.add('correct');
    if (!correct) document.getElementById('tf-true').classList.add('wrong');
  }

  showFeedback(correct, `正確答案：${q.ans ? '○ 正確' : '✕ 錯誤'}`);
  updateActions();
}

function showFeedback(correct, hint) {
  const fb = document.getElementById('feedback');
  fb.className = `feedback show ${correct ? 'correct-fb' : 'wrong-fb'}`;
  fb.innerHTML = `<span class="feedback-icon">${correct ? '✅' : '❌'}</span>${correct ? '答對了！' : '答錯了。'} ${hint}`;
}

function updateActions() {
  const area = document.getElementById('quiz-area');
  const actions = area.querySelector('.actions');
  if (actions) {
    actions.innerHTML = `
      <button class="btn btn-primary" onclick="nextQuestion()">下一題 →</button>
      <button class="btn btn-secondary" onclick="skipQuestion()">跳過</button>
    `;
  }
}

function nextQuestion() {
  current++;
  renderQuestion();
}

function skipQuestion() {
  current++;
  if (current >= pool.length) showResult();
  else renderQuestion();
}

function updateStats() {
  document.getElementById('stat-total').textContent = pool.length || 0;
  document.getElementById('stat-done').textContent = sessionAnswered.size;
  document.getElementById('stat-correct').textContent = correctCount;
  document.getElementById('stat-wrong').textContent = wrongCount;

  const pct = pool.length ? Math.round(sessionAnswered.size / pool.length * 100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = `${current} / ${pool.length}`;
  document.getElementById('prog-pct').textContent = pct + '%';
}

function showResult() {
  document.getElementById('quiz-area').style.display = 'none';
  const rs = document.getElementById('result-screen');
  rs.classList.add('show');

  const total = sessionAnswered.size;
  const pct = total ? Math.round(correctCount / total * 100) : 0;

  let grade, color, msg;
  if (pct >= 90) { grade = '優秀 🏆'; color = '#22c55e'; msg = '表現卓越！準備好考試了！'; }
  else if (pct >= 80) { grade = '良好 👍'; color = '#0ea5e9'; msg = '相當不錯，再複習弱點即可。'; }
  else if (pct >= 60) { grade = '尚可 📚'; color = '#f59e0b'; msg = '還需要加強，多複習錯題。'; }
  else { grade = '需加強 💪'; color = '#ef4444'; msg = '請重新仔細複習題庫。'; }

  document.getElementById('result-score').textContent = pct + '%';
  document.getElementById('result-score').style.color = color;
  document.getElementById('result-grade').textContent = grade;
  document.getElementById('result-msg').textContent = `作答 ${total} 題，答對 ${correctCount} 題，答錯 ${wrongCount} 題。${msg}`;
}

// Init
restartQuiz();
</script>
